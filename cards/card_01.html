<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1080">
  <title>여유로와 — 주차/이동</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="card">
    <div class="card-body">
      <div class="section-label">01 — PARKING &amp; ACCESS</div>
      <div class="card-title">주차 &amp; 이동</div>
      <div class="divider"></div>

      <div class="item-block">
        <div class="item-label">주차</div>
        <div class="item-text">
          마당까지 들어올 수 있습니다.<br>
          주차 후 <strong>차량 이동</strong>을 부탁드립니다.
        </div>
      </div>

      <div class="divider full"></div>

      <div class="item-block">
        <div class="item-label">이동</div>
        <div class="item-text">
          충남선행 링크를 이용해 주세요.
        </div>
      </div>

      <div class="divider full"></div>

      <div class="item-block">
        <div class="item-label">식사하기</div>
        <div class="item-text">
          현관 성냥장 상부에 <strong>식사류 안내</strong>가 있습니다.<br>
          상비약도 함께 비치되어 있습니다.
        </div>
      </div>
    </div>

    <div class="card-footer">
      <span class="footer-brand">여유로와</span>
      <span class="footer-page">01 / 07</span>
    </div>
  </div>
</body>
</html>
