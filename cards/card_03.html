<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1080">
  <title>여유로와 — 자쿠지/거실</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .wifi-row {
      display: flex;
      gap: 48px;
      margin-top: 16px;
    }
    .wifi-field {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="card-body">
      <div class="section-label">03 — JACUZZI &amp; LIVING</div>
      <div class="card-title">자쿠지 &amp; 거실</div>
      <div class="divider"></div>

      <div class="item-block">
        <div class="item-label">자쿠지</div>
        <div class="item-text">
          수압이 약해 물을 채우는 데 <strong>약 2시간</strong> 정도 걸립니다.<br>
          미리 받아두시길 권장합니다.
        </div>
        <div class="highlight-box">
          <div class="item-text">봄에 수압 공사 예정입니다.</div>
        </div>
      </div>

      <div class="divider full"></div>

      <div class="item-block">
        <div class="item-label">거실</div>
        <div class="item-text">
          <strong>스탠바이미</strong> + <strong>블루투스 스피커</strong> 구비<br>
          두 기기 모두 무선 충전 방식입니다.
        </div>
      </div>

      <div class="divider full"></div>

      <div class="item-block">
        <div class="item-label">WIFI</div>
        <div class="wifi-box">
          <div class="wifi-row">
            <div class="wifi-field">
              <div class="wifi-label">NETWORK</div>
              <div class="wifi-value">KT_GiGA_C245</div>
            </div>
            <div class="wifi-field">
              <div class="wifi-label">PASSWORD</div>
              <div class="wifi-value">6dzg08hd30</div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="card-footer">
      <span class="footer-brand">여유로와</span>
      <span class="footer-page">03 / 07</span>
    </div>
  </div>
</body>
</html>
