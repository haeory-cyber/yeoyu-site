<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1080">
  <title>여유로와 — 냉난방/주방</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="card">
    <div class="card-body">
      <div class="section-label">02 — CLIMATE &amp; KITCHEN</div>
      <div class="card-title">냉난방 &amp; 주방</div>
      <div class="divider"></div>

      <div class="item-block">
        <div class="item-label">에어컨 / 보일러</div>
        <div class="item-text">
          올라오기 전 <strong>미리 켜두셔야</strong> 적정 온도가 유지됩니다.
        </div>
        <div class="highlight-box">
          <div class="item-text">
            스마트폰으로 원격 조정 가능 —<br>
            앱에서 <strong>"on" 버튼</strong>을 눌러 주세요.
          </div>
        </div>
      </div>

      <div class="divider full"></div>

      <div class="item-block">
        <div class="item-label">주방</div>
        <div class="item-text">
          밥·식재료는 <strong>직접 준비</strong>해 오셔야 합니다.<br>
          냉동고, 식기, 조리도구는 구비되어 있습니다.
        </div>
        <div class="highlight-box">
          <div class="item-text">
            설거지는 사용 후 <strong>바로</strong> 해주세요.
          </div>
        </div>
      </div>
    </div>

    <div class="card-footer">
      <span class="footer-brand">여유로와</span>
      <span class="footer-page">02 / 07</span>
    </div>
  </div>
</body>
</html>
